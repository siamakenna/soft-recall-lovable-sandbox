<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Soft Recall mirror close-up</title>
  <desc id="desc">First-person dresser and mirror with soft reflection, grounding notes, pale blue haze, and bedside objects.</desc>
  <defs>
