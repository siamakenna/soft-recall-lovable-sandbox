<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Soft Recall bedroom bedside scene</title>
  <desc id="desc">First-person watercolor bedroom with quilt, bedside table, phone, glasses, note, window light, plants, wall art, and door.</desc>
  <defs>
    <filter id="ink"><feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="4" seed="31"/><feColorMatrix type="saturate" values=".25"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency=".032" numOctaves="3" seed="9"/><feDisplacementMap in="SourceGraphic" scale="7"/></filter>
    <radialGradient id="windowGlow" cx="50%" cy="48%" r="68%"><stop offset="0" stop-color="#ffe0a3"/><stop offset=".46" stop-color="#cc8b54" stop-opacity=".42"/><stop offset="1" stop-color="#1b2027" stop-opacity=".14"/></radialGradient>
