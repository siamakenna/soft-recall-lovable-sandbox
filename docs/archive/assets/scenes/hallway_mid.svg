<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Soft Recall hallway midpoint</title>
  <desc id="desc">A long blue-violet hallway with runner, repeated notes, keys, appointment card, tote, sneakers, and a distant front door.</desc>
  <defs>
    <filter id="rough"><feTurbulence type="fractalNoise" baseFrequency=".018" numOctaves="4" seed="72"/><feDisplacementMap in="SourceGraphic" scale="10"/></filter>
    <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency=".045" numOctaves="3" seed="19"/><feColorMatrix type="saturate" values=".2"/><feBlend in="SourceGraphic" mode="multiply"/></filter>
    <linearGradient id="hall" x1="0" x2="1"><stop offset="0" stop-color="#202535"/><stop offset=".48" stop-color="#5b504c"/><stop offset="1" stop-color="#171b26"/></linearGradient>
    <radialGradient id="doorLight" cx="52%" cy="45%" r="58%"><stop offset="0" stop-color="#f2c17b" stop-opacity=".62"/><stop offset=".42" stop-color="#9c6547" stop-opacity=".33"/><stop offset="1" stop-color="#121722" stop-opacity=".1"/></radialGradient>
    <style>
      .line{fill:none;stroke:#161316;stroke-width:4;stroke-linecap:round;stroke-linejoin:round;opacity:.58}
      .thin{fill:none;stroke:#161316;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;opacity:.46}
      .note{font:22px serif;fill:#2a241d}
    </style>
  </defs>
  <rect width="1600" height="900" fill="#0e1320"/>
  <path d="M82 61 L1514 42 L1456 845 L142 848 Z" fill="url(#hall)" filter="url(#rough)"/>
  <path d="M264 84 L615 154 L579 744 L157 848 Z" fill="#20283a" opacity=".58"/>
  <path d="M1308 76 L995 162 L1029 746 L1448 846 Z" fill="#171b25" opacity=".66"/>
  <path d="M657 153 L970 161 L1012 747 L596 743 Z" fill="#3a302f" opacity=".52"/>
  <g transform="translate(667 95)">
    <path d="M0 31 L322 48 L304 573 L25 587 Z" fill="#604231" opacity=".82" filter="url(#rough)"/>
    <path d="M31 82 L276 92 L260 535 L45 544 Z" fill="#1d2225" opacity=".35"/>
    <path d="M0 31 L322 48 L304 573 L25 587 Z" class="line"/>
    <path d="M45 544 L153 410 L260 535M31 82 L152 232 L276 92" class="thin"/>
    <rect x="281" y="293" width="18" height="38" rx="9" fill="#d2ad58"/>
    <path d="M-18 25 C62 0 240 9 344 43" fill="url(#doorLight)" opacity=".7"/>
  </g>
  <path d="M581 744 C676 579 840 570 1019 746 L1156 852 L421 852 Z" fill="#2f3242" opacity=".78" filter="url(#rough)"/>
  <path d="M650 745 C725 632 865 617 954 745 L1012 851 L574 852 Z" fill="#6d4651" opacity=".35"/>
  <path d="M717 742 C781 679 876 674 928 744" class="thin"/>
  <g transform="translate(237 217)">
    <rect x="0" y="0" width="110" height="138" rx="7" fill="#e7d2ab" stroke="#32251e" stroke-width="4" filter="url(#rough)"/>
    <text x="19" y="38" class="note">keys</text>
    <text x="19" y="70" class="note">phone</text>
    <text x="19" y="102" class="note">card</text>
    <text x="19" y="128" class="note">keys?</text>
  </g>
  <g transform="translate(1090 250)">
    <rect x="0" y="0" width="132" height="106" rx="7" fill="#e7d2ab" stroke="#32251e" stroke-width="4" filter="url(#rough)"/>
    <text x="19" y="36" class="note">appt.</text>
    <text x="19" y="70" class="note">9:30</text>
    <path d="M84 68 C101 49 126 68 106 90 C86 112 55 98 65 76 C70 65 78 61 84 68Z" class="thin"/>
  </g>
  <g transform="translate(363 461)">
    <path d="M0 29 C55 -7 119 -1 151 36 C116 73 47 76 0 29Z" fill="#d6b15c" stroke="#201816" stroke-width="4"/>
    <circle cx="33" cy="28" r="13" fill="none" stroke="#241c18" stroke-width="6"/>
    <path d="M46 30 L136 34M90 34 L94 52M113 34 L118 50" class="line"/>
  </g>
  <g transform="translate(1145 570)">
    <path d="M42 0 C95 20 125 88 101 165 L0 159 C2 72 9 18 42 0Z" fill="#435146" stroke="#1a1514" stroke-width="4" filter="url(#rough)"/>
    <path d="M35 3 C59 51 62 104 55 159M86 54 C62 53 43 75 37 110" class="thin"/>
  </g>
  <g transform="translate(268 704)">
    <path d="M0 42 C45 10 105 3 148 32 C135 71 39 78 0 42Z" fill="#2e3338" stroke="#181415" stroke-width="4"/>
    <path d="M146 42 C192 9 250 6 289 35 C269 71 181 78 146 42Z" fill="#343a40" stroke="#181415" stroke-width="4"/>
    <path d="M20 39 C57 50 105 48 134 33M168 39 C206 50 247 49 276 36" class="thin"/>
  </g>
  <g transform="translate(531 315)">
    <rect x="0" y="0" width="128" height="82" rx="8" fill="#e9d2aa" stroke="#30241d" stroke-width="4"/>
    <text x="16" y="34" class="note">circled</text>
    <text x="16" y="66" class="note">twice</text>
  </g>
  <rect width="1600" height="900" filter="url(#grain)" opacity=".34"/>
  <rect x="82" y="61" width="1432" height="787" rx="26" fill="none" stroke="#191419" stroke-width="8" opacity=".6"/>
</svg>
